<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fleur+De+Leah&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/velvet-quill/static/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>The Velvet Quill</title>
  </head>

  <body>
    <div class="title-bar">
      <div class="logo">The Velvet Quill</div>
    </div>
    <!-- <div class="niche-corosel">
      <div class="niche-item"><i>Horror</i></div>
      <div class="niche-item"><i>Fantasy</i></div>
      <div class="niche-item"><i>Mystery</i></div>
    </div> -->
    <div class="body">
      <h2>Recent Stories</h2>
      <div class="story-grid">
        <!-- Stories will be hydrated here -->
      </div>
    </div>
  </body>
  <script>
    const SUPABASE_URL = "https://uhqiwochrsrviqdtaurk.supabase.co";
    const SUPABASE_KEY = "sb_publishable_3F1q3nziWjsv3GDN9Y_1nQ_OhibY-5k";
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function hydrateStories() {
      const grid = document.querySelector(".story-grid");

      try {
        const { data: stories, error } = await db
          .from("stories")
          .select("id, title, url_safe_name, summary")
          .order("created_at", { ascending: false });
        if (error) throw error;

        if (!stories || stories.length === 0) {
          grid.innerHTML = "<p>No stories found.</p>";
          return;
        }

        grid.innerHTML = stories
          .map(
            (story) => `
            <a href="story?name=${story.url_safe_name}">
              <h2>${story.title}</h2>
              <p>${story.summary}</p>
            </a>
        `,
          )
          .join("");
      } catch (err) {
        console.error("Hydration failed:", err.message);
        grid.innerHTML = `
            <p>Unable to load stories at this time.</p>
            <small>${err.message}</small>
        `;
      }
    }

    // Run on page load
    document.addEventListener("DOMContentLoaded", hydrateStories);
  </script>
</html>
